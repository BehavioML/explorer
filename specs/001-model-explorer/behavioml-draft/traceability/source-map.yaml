# Feature-local experimental traceability map.
#
# Mappings connect inspected source specification and planning anchors to proposed
# feature-local BehavioML draft elements. Traceability remains external for now
# and is not represented as a BehavioML metamodel field.

mappings:
  - source: specs/001-model-explorer/spec.md#feature
    targets:
      - roles:explorer
      - workflows:workspace/load_from_uploaded_archive
      - workflows:workspace/load_from_remote_archive_url
      - decisions:keep_explorer_read_only_and_archive_based
